name: Supabase Database Backup

on:
  schedule:
    # Tự động chạy lúc 00:00 hàng ngày (theo giờ UTC)
    # Tương đương 07:00 sáng hàng ngày theo giờ Việt Nam (UTC+7)
    - cron: "0 0 * * *"
  workflow_dispatch: # Cho phép kích hoạt thủ công từ giao diện GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Backup Database (Native Docker PG17)
        env:
          # Đảm bảo SUPABASE_DB_URL đã có chứa sẵn password
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backups
          
          # Sử dụng image postgres:17 chính thức qua Docker thay vì Supabase CLI để tránh lỗi phiên bản
          docker run --rm -v $(pwd)/backups:/backups -e DB_URL="$SUPABASE_DB_URL" postgres:17 bash -c '
            echo "Dumping schema..."
            pg_dump --clean \
              --exclude-schema="auth" --exclude-schema="storage" --exclude-schema="graphql" \
              --exclude-schema="realtime" --exclude-schema="supabase_functions" \
              --exclude-schema="supabase_migrations" --exclude-schema="vault" \
              --exclude-schema="extensions" --exclude-schema="pgbouncer" --exclude-schema="pgsodium" \
              -d "$DB_URL" -f /backups/schema.sql --schema-only
            
            echo "Dumping data..."
            pg_dump -a \
              --exclude-schema="auth" --exclude-schema="storage" --exclude-schema="graphql" \
              --exclude-schema="realtime" --exclude-schema="supabase_functions" \
              --exclude-schema="supabase_migrations" --exclude-schema="vault" \
              --exclude-schema="extensions" --exclude-schema="pgbouncer" --exclude-schema="pgsodium" \
              -d "$DB_URL" -f /backups/data.sql
          '

          # (Tuỳ chọn) Nén các file lại để tránh làm phình to repo git
          gzip -f backups/schema.sql backups/data.sql

      - name: Commit and Push backups
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          # Chỉ commit nếu có sự thay đổi dữ liệu
          git commit -m "Supabase backup: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
